##### ===== Emacs-friendly, minimal, stable tmux.conf ===== #####

##### ===== Change prefix to Ctrl+t ===== #####

# 기존 prefix 해제
unbind C-b

set -g prefix C-w
bind-key C-t send-prefix

# Terminal / colors (safe defaults)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g xterm-keys on

# Responsiveness + scrollback
set -sg escape-time 0
set -g history-limit 100000

# Index from 1 (optional but nice)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Keep tmux default prefix (best for Emacs users)
# Prefix: C-b (default)  -> do NOT change

# Copy-mode: Emacs style
setw -g mode-keys emacs

# Mouse (pane select/resize + wheel scroll)
set -g mouse on

# Splits keep current working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind %  split-window -h -c "#{pane_current_path}"

# Quality-of-life
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"
bind s choose-tree -Zw

# Status bar (simple)
set -g status-interval 2
set -g status-left "#S "
set -g status-right "%Y-%m-%d %H:%M "

##### ===== Optional: TPM + session restore (recommended on WSL) ===== #####
# Install TPM once:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then inside tmux: prefix + I (capital i)

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Save/restore tmux sessions (layout, windows)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'

set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;c;%p1%s\007'
# OSC/DCS passthrough 허용 (tmux 3.2+)
set -g allow-passthrough all

# tmux가 clipboard 기능(osc52) 있다고 인식하게
set -ga terminal-features ',xterm*:clipboard'

# Reliable clipboard integration for VNC/X11 via xclip
bind-key -T copy-mode-emacs M-w send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key P run-shell "xclip -o -selection clipboard 2>/dev/null | tmux load-buffer - ; tmux paste-buffer"

##### ===== Emacs-style pane navigation (SAFE: prefix + C-p/n/b/f) ===== #####
bind C-b select-pane -L   # prefix + C-b  -> left
bind C-f select-pane -R   # prefix + C-f  -> right
bind C-p select-pane -U   # prefix + C-p  -> up
bind C-n select-pane -D   # prefix + C-n  -> downy

run '~/.tmux/plugins/tpm/tpm'
